<svg width="880" height="330" viewBox="0 0 880 330" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Joshua Corrales - Software Engineering">
  <defs>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <style>
      .name { font-family: Inter, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 700; }
      .eye  { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-weight: 600; letter-spacing: 3px; }
      .tag  { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-weight: 400; }
      .lbl  { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-weight: 600; letter-spacing: 1.5px; }
      .val  { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-weight: 400; }
    </style>
  </defs>

  <text x="34" y="52" class="eye" font-size="12" fill="#6E7681">SOFTWARE ENGINEERING</text>
  <text x="32" y="106" class="name" font-size="52" fill="#6366F1">Joshua Corrales</text>
  <rect x="34" y="122" width="132" height="4" rx="2" fill="url(#rule)"/>
  <text x="34" y="156" class="tag" font-size="16" fill="#8B949E">backend and cloud systems, moving toward solutions architecture</text>

  <g stroke="#6366F1" stroke-width="1.5" opacity="0.55">
    <line x1="704" y1="62" x2="792" y2="44"/>
    <line x1="704" y1="62" x2="760" y2="120"/>
    <line x1="792" y1="44" x2="840" y2="110"/>
    <line x1="760" y1="120" x2="840" y2="110"/>
    <line x1="760" y1="120" x2="704" y2="150"/>
  </g>
  <g>
    <circle cx="704" cy="62" r="6" fill="#6366F1"/>
    <circle cx="792" cy="44" r="6" fill="#14B8A6"/>
    <circle cx="760" cy="120" r="6" fill="#6366F1"/>
    <circle cx="840" cy="110" r="6" fill="#14B8A6"/>
    <circle cx="704" cy="150" r="5" fill="none" stroke="#8B949E" stroke-width="1.5"/>
  </g>

  <line x1="34" y1="190" x2="846" y2="190" stroke="#8B949E" stroke-width="1" opacity="0.25"/>

  <text x="34"  y="216" class="lbl" font-size="13" fill="#6E7681">BUILD</text>
  <text x="150" y="216" class="val" font-size="15" fill="#6366F1">Python  ·  TypeScript  ·  Node.js</text>

  <text x="34"  y="250" class="lbl" font-size="13" fill="#6E7681">DATA</text>
  <text x="150" y="250" class="val" font-size="15" fill="#14B8A6">SQL  ·  MySQL</text>

  <text x="34"  y="284" class="lbl" font-size="13" fill="#6E7681">OPERATE</text>
  <text x="150" y="284" class="val" font-size="15" fill="#6366F1">Docker  ·  Git</text>

  <text x="34"  y="318" class="lbl" font-size="13" fill="#6E7681">FOCUS</text>
  <text x="150" y="318" class="val" font-size="15" font-weight="600" fill="#14B8A6">Architecture  ·  Security  ·  Automation</text>
</svg>
