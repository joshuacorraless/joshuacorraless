<svg width="880" height="460" viewBox="0 0 880 460" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Joshua Corrales — Computer Engineering</title>
  <desc id="desc">Profile header showing Joshua Corrales, his focus on backend, data and cloud systems, and his technology stack.</desc>

  <defs>
    <linearGradient id="accent" x1="30" y1="0" x2="850" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF6B4A"/>
      <stop offset="1" stop-color="#FFB454"/>
    </linearGradient>
    <style>
      .sans { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .label { font-weight: 700; letter-spacing: 1.4px; }
      .stack { font-weight: 450; }
    </style>
  </defs>

  <rect width="880" height="460" rx="16" fill="#101215"/>
  <rect x="1" y="1" width="878" height="458" rx="15" stroke="#FFFFFF" stroke-opacity="0.10"/>
  <rect x="30" y="28" width="6" height="132" rx="3" fill="url(#accent)"/>

  <text x="56" y="50" class="mono label" font-size="11" fill="#FF9B6A">COMPUTER ENGINEERING · TEC COSTA RICA</text>
  <text x="54" y="101" class="sans" font-size="48" font-weight="750" fill="#F5F2EA">Joshua Corrales</text>
  <text x="56" y="132" class="mono" font-size="14" fill="#B7BBC3">backend systems · data platforms · cloud infrastructure</text>
  <text x="56" y="157" class="mono" font-size="12" fill="#747A84">final-year student / graduating soon</text>

  <text x="820" y="119" text-anchor="end" class="sans" font-size="104" font-weight="800" fill="#FFFFFF" fill-opacity="0.035">JC</text>
  <text x="820" y="151" text-anchor="end" class="mono label" font-size="10" fill="#747A84">ARCHITECTURE · SECURITY · AUTOMATION</text>

  <line x1="30" y1="188" x2="850" y2="188" stroke="url(#accent)" stroke-width="2"/>
  <text x="30" y="215" class="mono label" font-size="10" fill="#747A84">WORKING STACK / 2026</text>

  <g class="mono">
    <text x="30" y="250" class="label" font-size="11" fill="#FF9B6A">LANGUAGES</text>
    <text x="140" y="250" class="stack" font-size="13" fill="#E7E2D8">TypeScript · JavaScript · Python · Java · C++</text>

    <text x="30" y="288" class="label" font-size="11" fill="#FF9B6A">BACKEND</text>
    <text x="140" y="288" class="stack" font-size="13" fill="#E7E2D8">Node.js · Express · NestJS · Prisma · REST</text>

    <text x="30" y="326" class="label" font-size="11" fill="#FF9B6A">DATABASES</text>
    <text x="140" y="326" class="stack" font-size="13" fill="#E7E2D8">PostgreSQL · MySQL · MongoDB · SQLite</text>

    <text x="30" y="364" class="label" font-size="11" fill="#FF9B6A">WEB / MOBILE</text>
    <text x="140" y="364" class="stack" font-size="13" fill="#E7E2D8">HTML · CSS · Bootstrap · Android</text>

    <text x="460" y="250" class="label" font-size="11" fill="#FFB454">PLATFORM</text>
    <text x="560" y="250" class="stack" font-size="13" fill="#E7E2D8">Docker · Kubernetes · NGINX · Railway</text>

    <text x="460" y="288" class="label" font-size="11" fill="#FFB454">DATA</text>
    <text x="560" y="288" class="stack" font-size="13" fill="#E7E2D8">Redis · Elasticsearch · Neo4j · Hive</text>

    <text x="460" y="326" class="label" font-size="11" fill="#FFB454">ANALYTICS</text>
    <text x="560" y="326" class="stack" font-size="13" fill="#E7E2D8">Spark · Airflow · Superset · OLAP</text>

    <text x="460" y="364" class="label" font-size="11" fill="#FFB454">SECURITY</text>
    <text x="560" y="364" class="stack" font-size="13" fill="#E7E2D8">Keycloak · JWT · OAuth · RBAC</text>
  </g>

  <line x1="30" y1="394" x2="850" y2="394" stroke="#FFFFFF" stroke-opacity="0.10"/>
  <text x="30" y="425" class="mono label" font-size="10" fill="#747A84">DELIVERY</text>
  <text x="112" y="425" class="mono stack" font-size="12" fill="#B7BBC3">Git · GitHub Actions · CI/CD · OpenAPI · Cloudinary · SendGrid · Figma</text>
  <rect x="819" y="414" width="31" height="3" rx="1.5" fill="url(#accent)"/>
</svg>